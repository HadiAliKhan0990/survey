services:
  survey-api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    networks:
      - survey-network

  survey-agent:
    build:
      context: ./survey-agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - SURVEY_API_BASE_URL=https://survey.townticks.com
      - AGENT_PORT=8000
    depends_on:
      - survey-api
    restart: unless-stopped
    networks:
      - survey-network

networks:
  survey-network:
    driver: bridge
