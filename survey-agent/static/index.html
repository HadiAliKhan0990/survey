<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #F0F2F5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: #002061;
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .header-dot { width: 10px; height: 10px; border-radius: 50%; background: #F5A400; flex-shrink: 0; }
    .header-title { font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
    .header-sub { font-size: 12px; opacity: 0.7; margin-top: 2px; }

    /* ── Chat area ── */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* ── Message bubbles ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 78%;
    }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.assistant { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #002061;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; color: #F5A400;
      flex-shrink: 0;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user {
      background: #002061;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      background: white;
      color: #1A1A2E;
      border-bottom-left-radius: 4px;
      border: 1px solid #E2E5EC;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    /* Bold markdown support */
    .bubble b { font-weight: 700; }

    .meta {
      font-size: 10px;
      color: #9096A8;
      margin-top: 5px;
      text-align: right;
    }
    .msg-row.assistant .meta { text-align: left; }

    /* ── Typing indicator ── */
    .typing-row { display: flex; align-items: center; gap: 8px; align-self: flex-start; }
    .typing-bubble {
      background: white; border: 1px solid #E2E5EC;
      border-radius: 18px; border-bottom-left-radius: 4px;
      padding: 12px 18px;
      display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #002061; opacity: 0.6;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1;   }
    }

    /* ── Input area ── */
    .input-area {
      padding: 14px 16px;
      background: white;
      border-top: 1px solid #E2E5EC;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #messageInput {
      flex: 1;
      padding: 11px 16px;
      border-radius: 24px;
      border: 1px solid #D1D5DB;
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    #messageInput:focus { border-color: #002061; }
    #sendBtn {
      width: 44px; height: 44px; border-radius: 50%;
      border: 2px solid #F5A400;
      background: #002061;
      color: #F5A400;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    #sendBtn:disabled { opacity: 0.4; cursor: default; }
    #sendBtn:hover:not(:disabled) { opacity: 0.85; }

    /* ── Interrupted banner ── */
    #interruptBanner {
      display: none;
      background: #FFF3CD;
      border-top: 2px solid #F5A400;
      padding: 8px 16px;
      font-size: 12px;
      color: #856404;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-dot"></div>
  <div>
    <div class="header-title">Survey Agent</div>
    <div class="header-sub">AI-powered survey management</div>
  </div>
</div>

<div id="interruptBanner">⏸ Agent is waiting for your answer to continue the conversation</div>

<div id="chat" class="chat-container"></div>

<div class="input-area">
  <textarea id="messageInput" rows="1" placeholder="Type your message…"
    oninput="autoResize(this)"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
  ></textarea>
  <button id="sendBtn" onclick="sendMessage()" disabled>➤</button>
</div>

<script>
  const API_BASE = "";
  const userId = "1";

  let interrupted = false;
  let loading = false;

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
    document.getElementById("sendBtn").disabled = !el.value.trim();
  }

  function scrollBottom() {
    const chat = document.getElementById("chat");
    chat.scrollTop = chat.scrollHeight;
  }

  function renderMarkdown(text) {
    return text
      .replace(/\*\*(.+?)\*\*/g, "<b>$1</b>")
      .replace(/\n/g, "<br>");
  }

  // ── Add message bubble ───────────────────────────────────────────────────
  function addMessage(role, text, meta) {
    const chat = document.getElementById("chat");
    const row = document.createElement("div");
    row.className = "msg-row " + role;

    if (role === "assistant") {
      const av = document.createElement("div");
      av.className = "avatar";
      av.textContent = "AI";
      row.appendChild(av);
    }

    const col = document.createElement("div");
    col.style.display = "flex";
    col.style.flexDirection = "column";
    col.style.maxWidth = "100%";

    const bubble = document.createElement("div");
    bubble.className = "bubble " + role;
    bubble.innerHTML = renderMarkdown(text);
    col.appendChild(bubble);

    if (meta) {
      const m = document.createElement("div");
      m.className = "meta";
      m.textContent = meta;
      col.appendChild(m);
    }

    row.appendChild(col);
    chat.appendChild(row);
    scrollBottom();
  }

  // ── Typing indicator ─────────────────────────────────────────────────────
  function showTyping() {
    const chat = document.getElementById("chat");
    const row = document.createElement("div");
    row.id = "typing";
    row.className = "typing-row";
    row.innerHTML = `
      <div class="avatar">AI</div>
      <div class="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    chat.appendChild(row);
    scrollBottom();
  }
  function hideTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  // ── Send message ─────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (!text || loading) return;

    addMessage("user", text);
    input.value = "";
    input.style.height = "auto";
    document.getElementById("sendBtn").disabled = true;
    loading = true;
    showTyping();

    try {
      const endpoint = interrupted ? "/resume" : "/chat";
      const payload  = interrupted
        ? { user_id: userId, answer: text }
        : { user_id: userId, message: text };

      const res  = await fetch(API_BASE + endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json();

      interrupted = data.interrupted || false;
      document.getElementById("interruptBanner").style.display =
        interrupted ? "block" : "none";

      hideTyping();

      const meta = [
        data.intent   ? "intent: " + data.intent   : "",
        data.service  ? "service: " + data.service  : "",
        "interrupted: " + interrupted,
      ].filter(Boolean).join("  |  ");

      addMessage("assistant", data.reply || JSON.stringify(data, null, 2), meta);

    } catch (err) {
      hideTyping();
      addMessage("assistant", "❌ Error: " + err.message);
    } finally {
      loading = false;
      document.getElementById("sendBtn").disabled = false;
    }
  }

  // ── Initial welcome message (fetched from agent) ─────────────────────────
  async function loadWelcome() {
    showTyping();
    try {
      const res  = await fetch(API_BASE + "/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId, message: "hello" }),
      });
      const data = await res.json();
      hideTyping();
      addMessage("assistant", data.reply || "Hi! How can I help you today?");
    } catch (e) {
      hideTyping();
      addMessage(
        "assistant",
        "Hi! 👋 I am your Survey Agent.\n\nHere is what I can do for you:\n\n" +
        "• 📋 Create a survey with you\n" +
        "• 💡 Suggest a sample survey for your industry\n" +
        "• 📄 Show you the list of your current surveys\n" +
        "• 📊 Show you the stats of your current surveys\n\n" +
        "What would you like to do?"
      );
    }
  }

  loadWelcome();
</script>
</body>
</html>
